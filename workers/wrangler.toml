name = "em-datasystem-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[vars]
NOTION_DB_EQUIPMENT      = "3690d834d60e81cc840ed14beced0b1c"
NOTION_DB_MATERIALS      = "3690d834d60e81bcb6bee7bea490ca2f"
NOTION_DB_SPECIFICATIONS = "3690d834d60e8139b68dc600f5bc1653"
NOTION_DB_PRICING        = "3690d834d60e819eb135dbf929e02c79"
NOTION_DB_INSPECTIONS    = "3690d834d60e816a9759c2297a7805eb"
# NOTION_TOKEN is a Secret — set via: wrangler secret put NOTION_TOKEN

# KV namespace for auth (users + sessions)
# Create with: wrangler kv:namespace create AUTH_KV
# Then replace the id below with the returned ID
[[kv_namespaces]]
binding = "AUTH_KV"
id = "5d43a09ec41c4bc08c940d0964ca8759"
